name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select release type'
        required: true
        type: choice
        options:
          - dev
          - release-patch
          - release-minor
          # Disabled: Major releases require careful coordination and are difficult to unpublish
          # - release-major
        default: 'dev'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          if [ "$RELEASE_TYPE" = "dev" ]; then
            # Dev build: append -dev.<timestamp> suffix, no git tag
            DEV_SUFFIX="dev.$(date +%Y%m%d%H%M%S)"
            NEW_VERSION="${CURRENT_VERSION}-${DEV_SUFFIX}"
            npm version "$NEW_VERSION" --no-git-tag-version
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            # Release build: bump patch or minor, commit and tag
            BUMP_TYPE="${RELEASE_TYPE#release-}"
            NEW_VERSION=$(npm version "$BUMP_TYPE" -m "chore: bump version to %s")
            echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
            git push origin main --follow-tags
          fi

          echo "New version: $(node -p "require('./package.json').version")"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build and publish (zip + dmg)
        if: github.event_name == 'push' || steps.bump.outputs.is_dev == 'false'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 15
          command: npx electron-builder --mac zip --arm64 --publish always --config electron-builder.config.js

      - name: Build dev (no sign, no publish)
        if: steps.bump.outputs.is_dev == 'true'
        uses: nick-fields/retry@v3
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 15
          command: npx electron-builder --mac zip --arm64 --config electron-builder.config.js -c.mac.notarize=false

      - name: Upload dev artifacts
        if: steps.bump.outputs.is_dev == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claudiu-dev-${{ steps.bump.outputs.version }}
          path: |
            dist/*.zip
          retention-days: 7

      - name: Update Homebrew tap
        if: github.event_name == 'push' || steps.bump.outputs.is_dev == 'false'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          # For tag pushes, extract version from tag
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          ZIP_URL="https://github.com/plosson/cct/releases/download/v${VERSION}/Claudiu-${VERSION}-arm64-mac.zip"
          # Wait for the release asset to be available
          for i in $(seq 1 30); do
            if curl -sfIL "$ZIP_URL" > /dev/null 2>&1; then break; fi
            echo "Waiting for release asset... ($i/30)"
            sleep 10
          done
          SHA256=$(curl -sfL "$ZIP_URL" | shasum -a 256 | awk '{print $1}')
          echo "Version: $VERSION, SHA256: $SHA256"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/plosson/homebrew-claudiu.git /tmp/homebrew-claudiu
          cd /tmp/homebrew-claudiu
          cat > Casks/claudiu.rb << CASK
          cask "claudiu" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/plosson/cct/releases/download/v#{version}/Claudiu-#{version}-arm64-mac.zip"
            name "Claudiu"
            desc "A Terminal Development Environment for Claude Code"
            homepage "https://github.com/plosson/cct"

            app "Claudiu.app"

            zap trash: [
              "~/Library/Application Support/Claudiu",
              "~/Library/Preferences/com.claudiu.app.plist",
            ]
          end
          CASK
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claudiu.rb
          git commit -m "Update Claudiu to $VERSION"
          git push
